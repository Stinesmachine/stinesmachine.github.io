name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Change to "master" if your branch is named master

permissions:
  contents: write # This explicitly allows the action to push to gh-pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API Key
        run: |
          sed -i "s/REPLACE_ME_WITH_KEY/${{ secrets.WEB3FORMS_ACCESS_KEY }}/g" index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4 # Updated to v4 for Node 24 support
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .